# NemoClaw network + filesystem policy for Terminia sandbox.
# Deny-by-default: only listed endpoints are allowed.
# Operator approval via `openshell term` for unlisted requests.
# Ref: https://docs.nvidia.com/nemoclaw/latest/reference/network-policies.html

filesystem:
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log

network:
  # Inference — routed through OpenShell gateway to litellm-proxy
  - name: inference
    endpoints:
      - inference.local:443
    binaries:
      - /usr/local/bin/openclaw
    rules:
      - methods: ["ALL"]

  # GitHub access for agent operations
  - name: github
    endpoints:
      - github.com:443
    binaries:
      - /usr/bin/gh
      - /usr/bin/git
    rules:
      - methods: ["ALL"]

  - name: github_rest_api
    endpoints:
      - api.github.com:443
    binaries:
      - /usr/bin/gh
    rules:
      - methods: ["GET", "POST", "PATCH", "PUT", "DELETE"]

  # OpenClaw ecosystem
  - name: clawhub
    endpoints:
      - clawhub.com:443
    binaries:
      - /usr/local/bin/openclaw
    rules:
      - methods: ["GET", "POST"]

  - name: openclaw_api
    endpoints:
      - openclaw.ai:443
    binaries:
      - /usr/local/bin/openclaw
    rules:
      - methods: ["GET", "POST"]

  - name: openclaw_docs
    endpoints:
      - docs.openclaw.ai:443
    binaries:
      - /usr/local/bin/openclaw
    rules:
      - methods: ["GET"]

  # npm registry for plugin management
  - name: npm_registry
    endpoints:
      - registry.npmjs.org:443
    binaries:
      - /usr/local/bin/openclaw
      - /usr/local/bin/npm
    rules:
      - methods: ["GET"]

  # Claude Code (included in NemoClaw baseline)
  - name: claude_code
    endpoints:
      - api.anthropic.com:443
      - statsig.anthropic.com:443
      - sentry.io:443
    binaries:
      - /usr/local/bin/claude
    rules:
      - methods: ["ALL"]

  # NVIDIA endpoints (included in NemoClaw baseline)
  - name: nvidia
    endpoints:
      - integrate.api.nvidia.com:443
      - inference-api.nvidia.com:443
    binaries:
      - /usr/local/bin/claude
      - /usr/local/bin/openclaw
    rules:
      - methods: ["ALL"]

  # Telegram bridge (included in NemoClaw baseline)
  - name: telegram
    endpoints:
      - api.telegram.org:443
    rules:
      - methods: ["GET", "POST"]
        paths: ["/bot*/**"]

  # Supabase — backend database access (service role)
  - name: supabase
    endpoints:
      - "*.supabase.co:443"
    binaries:
      - /usr/local/bin/node
      - /usr/local/bin/openclaw
    rules:
      - methods: ["ALL"]

  # VIES — EU VAT number validation
  - name: vies_api
    endpoints:
      - ec.europa.eu:443
    binaries:
      - /usr/local/bin/node
    rules:
      - methods: ["GET", "POST"]

  # ANAC OpenData — Italian public procurement datasets
  - name: anac_opendata
    endpoints:
      - dati.anticorruzione.it:443
    binaries:
      - /usr/local/bin/node
    rules:
      - methods: ["GET"]

  # ANAC Casellario — supplier annotation checks
  - name: anac_casellario
    endpoints:
      - casellario.anticorruzione.it:443
    binaries:
      - /usr/local/bin/node
    rules:
      - methods: ["GET", "POST"]

  # TED Europa — EU public procurement notices
  - name: ted_europa
    endpoints:
      - ted.europa.eu:443
      - api.ted.europa.eu:443
    binaries:
      - /usr/local/bin/node
    rules:
      - methods: ["GET"]
