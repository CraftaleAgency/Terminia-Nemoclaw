services:
    # OpenShell Gateway — k3s-based sandbox runtime for NemoClaw skills.
    # Sandboxes are created by the gateway (via nemoclaw CLI), not as compose services.
    openshell-gateway:
        image: ghcr.io/nvidia/openshell/cluster:0.0.16
        container_name: openshell-gateway
        restart: unless-stopped
        privileged: true
        cgroupns: host
        pid: host
        entrypoint: ["/entrypoint-wrapper.sh"]
        command: ["server"]
        ports:
            - "${GATEWAY_HOST_PORT:-8082}:${OPENSHELL_PORT:-30051}"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - nemoclaw-data:/root/.nemoclaw
            - openshell-data:/root/.openshell
            - sandbox-data:/sandbox
            - openshell-cluster-terminia-gateway:/var/lib/rancher/k3s
            - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
        environment:
            - OPENSHELL_GATEWAY=${OPENSHELL_GATEWAY:-terminia-gateway}
            - OPENSHELL_PORT=${OPENSHELL_PORT:-30051}
        networks:
            - llmserver-ai-network
            - dokploy-network
        healthcheck:
            test: ["CMD-SHELL", "pgrep -x k3s || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 120s

    # NemoClaw REST API — Express server (Node 22, TypeScript)
    terminia-api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: terminia-api
        restart: unless-stopped
        ports:
            - "${API_HOST_PORT:-3100}:3100"
        environment:
            - PORT=3100
            - NODE_ENV=production
            # Supabase — use internal Docker DNS (kong on dokploy-network)
            - SUPABASE_URL=${SUPABASE_URL}
            - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
            # LiteLLM — internal Docker DNS (llmserver-ai-network)
            - LITELLM_URL=http://litellm-proxy:4000
            - LITELLM_API_KEY=${LITELLM_API_KEY:-}
            # CORS — allow frontend origins
            - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,https://terminia.pezserv.org}
            # Telegram bot
            - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
        networks:
            - llmserver-ai-network
            - dokploy-network
        depends_on:
            openshell-gateway:
                condition: service_started

networks:
    llmserver-ai-network:
        name: llmserver-ai-network
        external: true
    dokploy-network:
        external: true

volumes:
    nemoclaw-data:
        driver: local
    openshell-data:
        driver: local
    sandbox-data:
        driver: local
    openshell-cluster-terminia-gateway:
        external: true
