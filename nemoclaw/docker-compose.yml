services:
    # OpenShell Gateway — core runtime that manages NemoClaw sandboxes.
    # Sandboxes are created by the gateway (via nemoclaw CLI), not as compose services.
    # See: https://docs.nvidia.com/nemoclaw/latest/reference/architecture.html
    openshell-gateway:
        image: ghcr.io/nvidia/openshell/cluster:0.0.16
        container_name: openshell-gateway
        restart: unless-stopped
        privileged: true
        pid: host
        ports:
            - "${GATEWAY_HOST_PORT:-8082}:${OPENSHELL_PORT:-30051}"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - nemoclaw-data:/root/.nemoclaw
            - openshell-data:/root/.openshell
            - sandbox-data:/sandbox
            - openshell-cluster-terminia-gateway:/var/lib/rancher/k3s
        environment:
            - OPENSHELL_GATEWAY=${OPENSHELL_GATEWAY:-terminia-gateway}
            - OPENSHELL_PORT=${OPENSHELL_PORT:-30051}
        networks:
            - llmserver-ai-network
            - dokploy-network
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:${OPENSHELL_PORT:-30051}/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    terminia-api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: terminia-api
        restart: unless-stopped
        ports:
            - "${API_HOST_PORT:-3100}:3100"
        environment:
            - PORT=3100
            - SUPABASE_URL=${SUPABASE_URL}
            - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
            - LITELLM_URL=http://litellm-proxy:4000
            - LITELLM_API_KEY=${LITELLM_API_KEY:-}
            - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,https://terminia.pezserv.org}
            - NODE_ENV=production
        networks:
            - llmserver-ai-network
            - dokploy-network
        depends_on:
            openshell-gateway:
                condition: service_healthy

networks:
    llmserver-ai-network:
        name: llmserver-ai-network
        external: true
    dokploy-network:
        external: true

volumes:
    nemoclaw-data:
        driver: local
    openshell-data:
        driver: local
    sandbox-data:
        driver: local
    openshell-cluster-terminia-gateway:
        external: true
