services:
    # Orchestrator - Nemotron-8B Claude Opus Distill (task planning, delegation)
    llama-server-orchestrator:
        image: local/llama-server:latest
        container_name: llama-server-orchestrator
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: ${ORCHESTRATOR_MEMORY_LIMIT:-10G}
        ports:
            - "${ORCHESTRATOR_PORT:-8083}:8080"
        volumes:
            - ${ORCHESTRATOR_MODEL_PATH}:/models:ro
        command:
            - --model
            - /models/${ORCHESTRATOR_MODEL_FILE}
            - --ctx-size
            - "${ORCHESTRATOR_CTX_SIZE:-32768}"
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
            - -t
            - "${ORCHESTRATOR_THREADS:-24}"
            - --jinja
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 45s
        networks:
            - llmserver-ai-network
            - dokploy-network

    # Worker - Nemotron-3-Nano-4B (fast execution)
    # NOTE: Requires official llama.cpp build (nemotron_h architecture).
    llama-server-worker:
        image: local/llama-server:latest
        container_name: llama-server-worker
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: ${WORKER_MEMORY_LIMIT:-6G}
        ports:
            - "${WORKER_PORT:-8084}:8080"
        volumes:
            - ${WORKER_MODEL_PATH}:/models:ro
        command:
            - --model
            - /models/${WORKER_MODEL_FILE}
            - --ctx-size
            - "${WORKER_CTX_SIZE:-16384}"
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
            - -t
            - "${WORKER_THREADS:-16}"
            - --jinja
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        networks:
            - llmserver-ai-network
            - dokploy-network

    # LiteLLM Proxy - OpenAI-compatible API gateway
    litellm-proxy:
        image: ghcr.io/berriai/litellm:main-latest
        container_name: litellm-proxy
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: ${LITELLM_MEMORY_LIMIT:-2G}
        ports:
            - "${LITELLM_PORT:-4000}:4000"
        environment:
            - LITELLM_PORT=${LITELLM_PORT:-4000}
            - LITELLM_DROP_PARAMS=${LITELLM_DROP_PARAMS:-true}
        command: ["--config", "/app/config.yaml", "--port", "${LITELLM_PORT:-4000}"]
        volumes:
            - ./litellm-config.yaml:/app/config.yaml:ro
        healthcheck:
            test:
                [
                    "CMD",
                    "python3",
                    "-c",
                    "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')",
                ]
            interval: 30s
            timeout: 90s
            retries: 3
        networks:
            - llmserver-ai-network
            - dokploy-network

networks:
    llmserver-ai-network:
        external: true
    dokploy-network:
        external: true
