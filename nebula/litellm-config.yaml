model_list:
  # Default routes to Orchestrator
  - model_name: default
    litellm_params:
      model: openai/nemotron-orchestrator-8b
      api_base: http://llama-server-orchestrator:8080/v1
      api_key: dummy
    model_info:
      supports_vision: false

  # Orchestrator - Nemotron-8B (task planning, complex reasoning)
  - model_name: nemotron-orchestrator
    litellm_params:
      model: openai/nemotron-orchestrator-8b
      api_base: http://llama-server-orchestrator:8080/v1
      api_key: dummy
    model_info:
      supports_vision: false

  # Worker - Nemotron-3-Nano-4B (fast execution)
  - model_name: nemotron-nano
    litellm_params:
      model: openai/nemotron-nano-4b
      api_base: http://llama-server-worker:8080/v1
      api_key: dummy
    model_info:
      supports_vision: false

  - model_name: fast
    litellm_params:
      model: openai/nemotron-nano-4b
      api_base: http://llama-server-worker:8080/v1
      api_key: dummy
    model_info:
      supports_vision: false

  # Vision - NVIDIA Nemotron-Nano-12B-v2-VL (image + text)
  - model_name: nemotron-vision
    litellm_params:
      model: openai/nemotron-nano-12b-vl
      api_base: http://llama-server-vision:8080/v1
      api_key: dummy
    model_info:
      supports_vision: true

  - model_name: vision
    litellm_params:
      model: openai/nemotron-nano-12b-vl
      api_base: http://llama-server-vision:8080/v1
      api_key: dummy
    model_info:
      supports_vision: true

  # OCR - NuMarkdown-8B-Thinking (document OCR, vision-language)
  - model_name: numarkdown
    litellm_params:
      model: openai/numarkdown
      api_base: http://llama-server-ocr:8080/v1
      api_key: dummy
    model_info:
      supports_vision: true

  - model_name: ocr
    litellm_params:
      model: openai/numarkdown
      api_base: http://llama-server-ocr:8080/v1
      api_key: dummy
    model_info:
      supports_vision: true

litellm_settings:
  drop_params: true
  set_verbose: false
