model_list:
  # Default routes to Orchestrator
  - model_name: default
    litellm_params:
      model: openai/nemotron-orchestrator-8b
      api_base: http://llama-server-orchestrator:8080/v1
      api_key: dummy
    model_info:
      supports_vision: false

  # Orchestrator - Nemotron-8B (task planning, complex reasoning)
  - model_name: nemotron-orchestrator
    litellm_params:
      model: openai/nemotron-orchestrator-8b
      api_base: http://llama-server-orchestrator:8080/v1
      api_key: dummy
    model_info:
      supports_vision: false

  # Worker - Nemotron-3-Nano-4B (fast execution)
  - model_name: nemotron-nano
    litellm_params:
      model: openai/nemotron-nano-4b
      api_base: http://llama-server-worker:8080/v1
      api_key: dummy
    model_info:
      supports_vision: false

  - model_name: fast
    litellm_params:
      model: openai/nemotron-nano-4b
      api_base: http://llama-server-worker:8080/v1
      api_key: dummy
    model_info:
      supports_vision: false

  # Vision - Qwen2.5-VL-7B (image + text, qwen2vl architecture)
  - model_name: nemotron-vision
    litellm_params:
      model: openai/qwen2.5-vl-7b
      api_base: http://llama-server-vision:8080/v1
      api_key: dummy
    model_info:
      supports_vision: true

  - model_name: vision
    litellm_params:
      model: openai/qwen2.5-vl-7b
      api_base: http://llama-server-vision:8080/v1
      api_key: dummy
    model_info:
      supports_vision: true

litellm_settings:
  drop_params: true
  set_verbose: false
