api:
  enabled: true
  address: 0.0.0.0:9001

sources:
  docker_host:
    type: docker_logs
    exclude_containers:
      - "*-vector"

transforms:
  project_logs:
    type: remap
    inputs:
      - docker_host
    source: |-
      .project = "default"
      .event_message = del(.message)
      .appName = del(.container_name)
      parsed, err = parse_json(.event_message)
      if err == null {
        .metadata = parsed
        if exists(.metadata.parsed) {
          .metadata.parsed = del(.metadata.parsed)
        }
      }

  router:
    type: route
    inputs:
      - project_logs
    route:
      kong: 'ends_with(string!(.appName), "-kong")'
      auth: 'ends_with(string!(.appName), "-auth")'
      rest: 'ends_with(string!(.appName), "-rest")'
      realtime: 'contains(string!(.appName), "-realtime")'
      storage: 'ends_with(string!(.appName), "-storage")'
      functions: 'contains(string!(.appName), "-edge")'
      db: 'ends_with(string!(.appName), "-db")'
      pooler: 'ends_with(string!(.appName), "-pooler")'

sinks:
  logflare_kong:
    type: http
    inputs:
      - router.kong
    encoding:
      codec: json
    method: post
    request:
      retry_max_duration_secs: 10
    uri: http://analytics:4000/api/logs?source_name=SB_KONG&api_key=${LOGFLARE_API_KEY}

  logflare_auth:
    type: http
    inputs:
      - router.auth
    encoding:
      codec: json
    method: post
    request:
      retry_max_duration_secs: 10
    uri: http://analytics:4000/api/logs?source_name=SB_AUTH&api_key=${LOGFLARE_API_KEY}

  logflare_rest:
    type: http
    inputs:
      - router.rest
    encoding:
      codec: json
    method: post
    request:
      retry_max_duration_secs: 10
    uri: http://analytics:4000/api/logs?source_name=SB_REST&api_key=${LOGFLARE_API_KEY}

  logflare_realtime:
    type: http
    inputs:
      - router.realtime
    encoding:
      codec: json
    method: post
    request:
      retry_max_duration_secs: 10
    uri: http://analytics:4000/api/logs?source_name=SB_REALTIME&api_key=${LOGFLARE_API_KEY}

  logflare_storage:
    type: http
    inputs:
      - router.storage
    encoding:
      codec: json
    method: post
    request:
      retry_max_duration_secs: 10
    uri: http://analytics:4000/api/logs?source_name=SB_STORAGE&api_key=${LOGFLARE_API_KEY}

  logflare_functions:
    type: http
    inputs:
      - router.functions
    encoding:
      codec: json
    method: post
    request:
      retry_max_duration_secs: 10
    uri: http://analytics:4000/api/logs?source_name=SB_FUNCTIONS&api_key=${LOGFLARE_API_KEY}

  logflare_db:
    type: http
    inputs:
      - router.db
    encoding:
      codec: json
    method: post
    request:
      retry_max_duration_secs: 10
    uri: http://analytics:4000/api/logs?source_name=SB_DB&api_key=${LOGFLARE_API_KEY}

  logflare_pooler:
    type: http
    inputs:
      - router.pooler
    encoding:
      codec: json
    method: post
    request:
      retry_max_duration_secs: 10
    uri: http://analytics:4000/api/logs?source_name=SB_POOLER&api_key=${LOGFLARE_API_KEY}
